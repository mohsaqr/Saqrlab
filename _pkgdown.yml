url: https://pak.dynasite.org/Saqrlab

template:
  bootstrap: 5
  bootswatch: flatly
  bslib:
    primary: "#0054AD"
    border-radius: 0.5rem
    btn-border-radius: 0.25rem

home:
  title: Saqrlab - A modern laboratory for data simulation
  description: >
    Generate synthetic datasets with known ground-truth parameters to test,
    validate, and benchmark statistical methods and Temporal Network Analysis.

navbar:
  structure:
    left: [reference, articles, guides, news]
    right: [search, github]
  components:
    reference:
      text: Reference
      href: reference/index.html
    guides:
      text: Guides
      href: guides/index.html
    news:
      text: Changelog
      href: news/index.html

reference:
  - title: "Getting started"
    desc: "One front door for every simulator, plus recovery scoring."
    contents:
      - simulate
      - list_simulators
      - saqr_sim
      - validate_recovery
      - tidy_simulation_results
      - export_simulation

  - title: "Scenario presets"
    desc: "Named, reproducible simulation recipes."
    contents:
      - list_scenarios
      - get_scenario
      - run_scenario

  - title: "Statistical simulators"
    desc: "Classic designs with explicit ground-truth effect sizes."
    contents:
      - simulate_ttest
      - simulate_anova
      - simulate_correlation
      - simulate_clusters
      - simulate_prediction
      - simulate_regression

  - title: "Latent-variable simulators"
    desc: "Mixtures, classes, factors, and sequence clusters."
    contents:
      - simulate_lpa
      - simulate_lca
      - simulate_fa
      - simulate_seq_clusters

  - title: "Longitudinal, multilevel & growth"
    desc: "VAR(1) panels, nested data, and growth curves."
    contents:
      - simulate_longitudinal
      - simulate_mlm
      - simulate_growth

  - title: "IRT, survival & hidden Markov"
    desc: "Item response, time-to-event, and latent-state processes."
    contents:
      - simulate_irt
      - simulate_survival
      - simulate_hmm

  - title: "Missing-data mechanisms"
    desc: "Inject MCAR / MAR / MNAR missingness with a known mechanism."
    contents:
      - inject_missingness

  - title: "Random-parameter (stress) simulation"
    desc: "Seed-driven structure for robustness testing."
    contents:
      - simulate_data

  - title: "TNA network simulation"
    desc: "Fitted TNA models, group networks, HTNA/MLNA/MTNA structures."
    contents:
      - simulate_tna_network
      - simulate_tna_networks
      - simulate_group_tna_networks
      - simulate_htna
      - simulate_mlna
      - simulate_mtna
      - simulate_tna_datasets
      - simulate_tna_matrix
      - generate_tna_datasets
      - generate_tna_networks
      - generate_group_tna_networks
      - generate_tna_matrix

  - title: "Sequences"
    desc: "Markov-chain sequences and sampling from fitted models."
    contents:
      - simulate_sequences
      - simulate_sequences_advanced
      - generate_sequence_data
      - sample_tna

  - title: "Matrices & probabilities"
    desc: "Raw transition matrices and stochastic probability vectors."
    contents:
      - simulate_matrix
      - generate_probabilities

  - title: "Networks & graphs"
    desc: "Social-network structures and format helpers."
    contents:
      - simulate_network
      - simulate_igraph
      - simulate_edge_list
      - simulate_long_data
      - simulate_onehot_data

  - title: "Model fitting"
    desc: "Fit TNA-family models to sequences."
    contents:
      - fit_network_model
      - cross_validate_tna

  - title: "Comparison & evaluation"
    desc: "Compare fitted networks, centralities, and estimators."
    contents:
      - compare_networks
      - compare_centralities
      - compare_edge_recovery
      - calculate_edge_recovery
      - compare_estimation
      - compare_network_estimation
      - compare_reliability
      - compare_tna_models
      - print.network_estimation
      - plot.network_estimation
      - print.tna_reliability_comparison
      - plot.tna_reliability_comparison

  - title: "Simulation studies & bootstrap"
    desc: "Grid experiments, bootstrap stability, and sampling analysis."
    contents:
      - run_bootstrap_simulation
      - run_bootstrap_iteration
      - run_grid_simulation
      - run_network_simulation
      - run_sampling_analysis
      - evaluate_bootstrap
      - analyze_grid_results
      - summarize_grid_results
      - create_param_grid
      - generate_param_grid
      - batch_fit_models
      - batch_apply

  - title: "Visualization"
    desc: "Plots for comparisons and sampling distributions."
    contents:
      - plot_tna_comparison
      - plot_network_estimation
      - plot_sampling_distribution

  - title: "Summaries & validation"
    desc: "Summarize results and validate simulation parameters."
    contents:
      - summarize_simulation
      - summarize_networks
      - validate_sim_params

  - title: "Learning states & names"
    desc: "Reference datasets of learning actions and diverse actor names."
    contents:
      - LEARNING_STATES
      - GROUP_REGULATION_ACTIONS
      - get_learning_states
      - list_learning_categories
      - smart_select_states
      - select_states
      - GLOBAL_NAMES
      - get_global_names
      - list_name_regions

footer:
  structure:
    left: developed_by
    right: built_with
